trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Update these with your actual Azure DevOps Service Connection and Backend details
  azureServiceConnection: 'your-service-connection-name'
  resourceGroupName: 'your-backend-rg'
  storageAccountName: 'your-backend-storage'
  containerName: 'tfstate'
  tfstateKey: 'microinfra.tfstate'
  workingDirectory: '$(System.DefaultWorkingDirectory)/Env'

stages:
- stage: StaticAnalysis
  displayName: 'Lint & Security Scan'
  jobs:
  - job: Analysis
    steps:
    - script: |
        curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
        tflint --version
      displayName: 'Install TFLint'
    
    - script: |
        cd $(workingDirectory)
        tflint --init
        tflint -f compact
      displayName: 'Run TFLint'

    - script: |
        curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
        tfsec --version
      displayName: 'Install tfsec'

    - script: |
        tfsec $(workingDirectory)
      displayName: 'Run tfsec'

- stage: Build
  displayName: 'Terraform Plan'
  dependsOn: StaticAnalysis
  jobs:
  - job: Plan
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - script: |
        cd $(workingDirectory)
        terraform fmt -check
      displayName: 'Terraform Format Check'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(workingDirectory)'
        backendServiceArm: '$(azureServiceConnection)'
        backendAzureRmResourceGroupName: '$(resourceGroupName)'
        backendAzureRmStorageAccountName: '$(storageAccountName)'
        backendAzureRmContainerName: '$(containerName)'
        backendAzureRmKey: '$(tfstateKey)'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Validate'
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(workingDirectory)'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Plan'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(workingDirectory)'
        environmentServiceNameAzureRM: '$(azureServiceConnection)'
        publishPlanResults: 'MicroInfraPlan'

- stage: Deploy
  displayName: 'Terraform Apply'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: Apply
    displayName: 'Apply Changes'
    environment: 'production' # Use this for manual approval in Azure DevOps
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(workingDirectory)'
              backendServiceArm: '$(azureServiceConnection)'
              backendAzureRmResourceGroupName: '$(resourceGroupName)'
              backendAzureRmStorageAccountName: '$(storageAccountName)'
              backendAzureRmContainerName: '$(containerName)'
              backendAzureRmKey: '$(tfstateKey)'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Apply'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(workingDirectory)'
              environmentServiceNameAzureRM: '$(azureServiceConnection)'
